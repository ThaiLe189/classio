services:
  web:
    build:
      context: .
      args:
        # Truyền từ .env hoặc shell. NEXT_PUBLIC_* nhúng lúc build.
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
